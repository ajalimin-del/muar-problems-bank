<html lang="en">

<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Muar Problems Bank</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#F4F1EB;color:#1F2937;min-height:100vh;display:flex;flex-direction:column}
a{color:inherit;text-decoration:none}
button,select,input{font-family:'DM Sans',sans-serif}

/* Layout */
.shell{display:flex;min-height:100vh}
.sidebar{width:220px;min-height:100vh;background:#162920;display:flex;flex-direction:column;padding:24px 0;position:sticky;top:0;height:100vh;flex-shrink:0}
.main{flex:1;padding:28px 32px;max-width:1200px}

/* Sidebar */
.brand{padding:0 20px 20px;border-bottom:1px solid rgba(255,255,255,0.1)}
.brand-name{font-family:'Fraunces',serif;font-size:17px;font-weight:600;color:#fff;line-height:1.3}
.brand-tag{font-size:11px;color:rgba(255,255,255,0.4);margin-top:4px}
nav{padding:16px 12px;flex:1}
.nav-btn{display:flex;align-items:center;gap:10px;width:100%;padding:10px 12px;border-radius:8px;border:none;cursor:pointer;margin-bottom:4px;background:transparent;color:rgba(255,255,255,0.65);font-size:14px;text-align:left;transition:all 0.15s}
.nav-btn:hover{background:rgba(255,255,255,0.07);color:#fff}
.nav-btn.active{background:rgba(212,144,10,0.22);color:#F0B429;font-weight:500}
.lang-section{padding:16px 20px;border-top:1px solid rgba(255,255,255,0.1)}
.lang-label{font-size:11px;color:rgba(255,255,255,0.4);margin-bottom:8px}
.lang-row{display:flex;gap:4px}
.lang-btn{flex:1;padding:5px 0;border-radius:6px;border:1px solid rgba(255,255,255,0.2);background:transparent;color:rgba(255,255,255,0.55);font-size:11px;cursor:pointer;transition:all 0.15s}
.lang-btn.active{border-color:#F0B429;background:#F0B429;color:#162920;font-weight:500}
.sidebar-foot{padding:8px 20px 4px;font-size:10px;color:rgba(255,255,255,0.2);text-align:center}

/* Cards */
.card{background:#fff;border-radius:12px;border:0.5px solid #E5E7EB;padding:20px}
.card-sm{background:#fff;border-radius:10px;border:0.5px solid #E5E7EB}

/* Stats grid */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
.stat-card{background:#fff;border-radius:12px;padding:18px 20px;border:0.5px solid #E5E7EB}
.stat-label{font-size:12px;color:#9CA3AF;margin-bottom:6px}
.stat-val{font-family:'Fraunces',serif;font-size:28px;font-weight:600}

/* Issue cards */
.issues-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px}
.issue-card{background:#fff;border-radius:12px;border:0.5px solid #E5E7EB;overflow:hidden;transition:box-shadow 0.15s}
.issue-card:hover{box-shadow:0 4px 16px rgba(0,0,0,0.07)}
.issue-body{padding:14px 16px 12px}
.issue-foot{padding:8px 16px;background:#FAFAF9;border-top:0.5px solid #F3F4F6;display:flex;justify-content:space-between;align-items:center;gap:8px}

/* Badges */
.badge{display:inline-block;font-size:10px;font-weight:500;padding:3px 8px;border-radius:99px}
.tag{display:inline-block;font-size:10px;padding:2px 6px;background:#F3F4F6;color:#6B7280;border-radius:4px}

/* Bar chart */
.bar-row{margin-bottom:10px}
.bar-label{display:flex;justify-content:space-between;font-size:12px;color:#4B5563;margin-bottom:4px}
.bar-track{height:5px;border-radius:99px;background:#F3F4F6;overflow:hidden}
.bar-fill{height:100%;border-radius:99px;transition:width 0.6s ease}

/* Filters */
.filter-row{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.filter-row input,.filter-row select{padding:8px 14px;border-radius:8px;border:0.5px solid #D1D5DB;font-size:13px;outline:none;background:#fff;transition:border-color 0.15s}
.filter-row input{flex:1;min-width:200px}
.filter-row input:focus,.filter-row select:focus{border-color:#162920}

/* Submit page */
.steps-list{counter-reset:steps}
.step{counter-increment:steps;display:flex;gap:16px;margin-bottom:20px;align-items:flex-start}
.step-num{width:30px;height:30px;border-radius:50%;background:#162920;color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500;flex-shrink:0;font-family:'Fraunces',serif}
.step-body{flex:1}
.step-title{font-weight:500;font-size:14px;margin-bottom:4px}
.step-desc{font-size:13px;color:#6B7280;line-height:1.6}
code{background:#F3F4F6;padding:1px 6px;border-radius:4px;font-size:12px;font-family:monospace}
.btn-primary{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;background:#162920;color:#fff;border:none;border-radius:8px;font-size:14px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:background 0.15s}
.btn-primary:hover{background:#1e3d30}
.btn-outline{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;background:#fff;color:#162920;border:0.5px solid #162920;border-radius:8px;font-size:13px;cursor:pointer;transition:all 0.15s}
.btn-outline:hover{background:#162920;color:#fff}

/* Empty */
.empty{text-align:center;padding:60px 0;color:#9CA3AF;font-size:14px}

/* Loader */
.loader{text-align:center;padding:40px;color:#9CA3AF;font-size:14px}
.spinner{display:inline-block;width:20px;height:20px;border:2px solid #E5E7EB;border-top-color:#162920;border-radius:50%;animation:spin 0.8s linear infinite;margin-bottom:10px}
@keyframes spin{to{transform:rotate(360deg)}}

/* Mobile */
@media(max-width:700px){
  .shell{flex-direction:column}
  .sidebar{width:100%;min-height:auto;height:auto;position:static;padding:12px 0}
  .brand{display:none}
  nav{display:flex;flex-direction:row;padding:0 12px;gap:4px}
  .nav-btn{justify-content:center;padding:8px}
  .lang-section{padding:8px 12px;border-top:none;border-left:1px solid rgba(255,255,255,0.1)}
  .lang-section{display:flex;align-items:center;gap:8px;margin-left:auto}
  .lang-label{display:none}
  .sidebar-foot{display:none}
  .main{padding:16px}
  .stats-grid{grid-template-columns:repeat(2,1fr)}
  .issues-grid{grid-template-columns:1fr}
}

/* Page header */
.page-header{margin-bottom:24px}
.page-title{font-family:'Fraunces',serif;font-size:26px;font-weight:600;color:#162920}
.page-sub{font-size:13px;color:#6B7280;margin-top:4px}

/* Two-col grid */
.two-col{display:grid;grid-template-columns:1fr 1.4fr;gap:18px;margin-bottom:20px}
@media(max-width:900px){.two-col{grid-template-columns:1fr}}

/* Sev distribution */
.sev-grid{display:flex;gap:10px;margin-top:12px}
.sev-cell{flex:1;text-align:center}
.sev-box{border-radius:8px;padding:12px 0;margin-bottom:6px}
.sev-count{font-family:'Fraunces',serif;font-size:20px;font-weight:600}
.sev-lbl{font-size:10px;color:#6B7280}

/* Notice banner */
.notice{background:#FEF3C7;border:0.5px solid #FCD34D;border-radius:10px;padding:14px 18px;margin-bottom:20px;font-size:13px;color:#78350F;display:flex;gap:10px;align-items:flex-start}

/* Section title */
.sec-title{font-size:13px;font-weight:500;color:#374151;margin-bottom:14px}
.row-between{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
</style>
</head>

    step3:"将此门户链接与您的团队、社区领袖或研究人员分享。",
    submitSteps:"提交流程",
    sub1:"点击下方表格按钮打开提交表格。",
    sub2:"填写议题详情 — 标题、类别、地点、受影响群体。",
    sub3:"提交。数据直接进入Google表格。",
    sub4:"下次页面加载时，门户立即反映您的提交。"
  }
};

// ──────────────────────────── STATE ────────────────────────────
let lang = 'en';
let view = 'dashboard';
let issues = [];
let filteredIssues = [];
let filterCat = 'All';
let filterSev = 'All';
let filterSearch = '';
let isConfigured = false;
let lastUpdated = null;

// ──────────────────────────── CSV PARSER ────────────────────────────
function parseCSV(text) {
  const rows = [];
  let i = 0;
  while (i < text.length) {
    const row = [];
    while (i < text.length && text[i] !== '\n') {
      let val = '';
      if (text[i] === '"') {
        i++;
        while (i < text.length) {
          if (text[i] === '"' && text[i+1] === '"') { val += '"'; i += 2; }
          else if (text[i] === '"') { i++; break; }
          else { val += text[i++]; }
        }
      } else {
        while (i < text.length && text[i] !== ',' && text[i] !== '\n') val += text[i++];
      }
      row.push(val.trim());
      if (text[i] === ',') i++;
    }
    if (text[i] === '\n') i++;
    if (row.some(v => v)) rows.push(row);
  }
  return rows;
}

function csvToIssues(rows) {
  if (rows.length < 2) return [];
  const headers = rows[0].map(h => h.trim().toLowerCase().replace(/\s+/g,'_'));
  return rows.slice(1).map(row => {
    const obj = {};
    headers.forEach((h,i) => { obj[h] = row[i] || ''; });
    return obj;
  }).filter(o => o.title || o.title_en);
}

// ──────────────────────────── FETCH ────────────────────────────
async function fetchIssues() {
  if (!CONFIG.SHEET_CSV_URL) {
    issues = SEEDS;
    isConfigured = false;
    lastUpdated = new Date();
    return;
  }
  try {
    const res = await fetch(CONFIG.SHEET_CSV_URL + '&cachebust=' + Date.now());
    const text = await res.text();
    const rows = parseCSV(text);
    const parsed = csvToIssues(rows);
    issues = parsed.length > 0 ? parsed : SEEDS;
    isConfigured = true;
    lastUpdated = new Date();
  } catch(e) {
    console.warn('Could not fetch sheet, using seed data', e);
    issues = SEEDS;
    isConfigured = false;
    lastUpdated = new Date();
  }
}

// ──────────────────────────── HELPERS ────────────────────────────
const t = () => I18N[lang];
const sev = (s) => SEV_META[parseInt(s)] || SEV_META[3];
const cat = (c) => CAT_META[c] || CAT_META['Other'];
const sevLabel = (s) => (sev(s).label[lang] || sev(s).label.en);
const catLabel = (c) => (t().catLabels[c] || c);

function getTitle(issue) {
  if (lang === 'zh') return issue.title_zh || issue.title_en || issue.title;
  if (lang === 'bm') return issue.title || issue.title_en;
  return issue.title_en || issue.title;
}
function getSummary(issue) {
  if (lang === 'bm') return issue.summary_bm || issue.summary;
  return issue.summary;
}

function applyFilters() {
  filteredIssues = issues.filter(i => {
    if (filterCat !== 'All' && i.category !== filterCat) return false;
    if (filterSev !== 'All' && String(i.severity) !== String(filterSev)) return false;
    if (filterSearch) {
      const q = filterSearch.toLowerCase();
      return [i.title,i.title_en,i.title_zh,i.summary,i.summary_bm,i.affectedcommunity||i.affectedCommunity,i.location].some(v => v && v.toLowerCase().includes(q));
    }
    return true;
  });
}

// ──────────────────────────── COMPONENTS ────────────────────────────
function issueCardHTML(issue) {
  const c = cat(issue.category);
  const s = sev(issue.severity);
  const title = getTitle(issue);
  const summary = getSummary(issue);
  const aff = issue.affectedcommunity || issue.affectedCommunity || '';
  const tags = (issue.tags||'').split(',').map(t=>t.trim()).filter(Boolean).slice(0,3);
  const url = issue.url || '';
  return `
  <div class="issue-card">
    <div class="issue-body">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:10px">
        <span class="badge" style="background:${c.bg};color:${c.color}">${c.icon} ${catLabel(issue.category)}</span>
        <span class="badge" style="background:${s.bg};color:${s.color};flex-shrink:0">${sevLabel(issue.severity)}</span>
      </div>
      <h4 style="font-size:13px;font-weight:500;color:#1F2937;margin:0 0 8px;line-height:1.4">${title}</h4>
      <p style="font-size:12px;color:#6B7280;margin:0 0 12px;line-height:1.5">${summary}</p>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;font-size:11px">
        <div style="color:#9CA3AF">${t().lbl.aff}: <span style="color:#4B5563;font-weight:500">${aff}</span></div>
        <div style="color:#9CA3AF">${t().lbl.loc}: <span style="color:#4B5563;font-weight:500">${issue.location}</span></div>
        <div style="color:#9CA3AF">${t().lbl.src}: <span style="color:#4B5563">${issue.source}</span></div>
        <div style="color:#9CA3AF">${t().lbl.sev}: <span style="color:${s.color};font-weight:500">${issue.severity}/5</span></div>
      </div>
    </div>
    <div class="issue-foot">
      <span style="font-size:11px;color:#9CA3AF">${issue.date}</span>
      <div style="display:flex;gap:4px;align-items:center">
        ${tags.map(tag=>`<span class="tag">#${tag}</span>`).join('')}
        ${url ? `<a href="${url}" target="_blank" style="font-size:11px;color:#D97706;margin-left:4px">↗</a>` : ''}
      </div>
    </div>
  </div>`;
}

// ──────────────────────────── VIEWS ────────────────────────────
function renderDashboard() {
  const total = issues.length;
  const cats = [...new Set(issues.map(i=>i.category))].length;
  const comms = [...new Set(issues.map(i=>i.affectedcommunity||i.affectedCommunity||''))].filter(Boolean).length;
  const avgSev = total ? (issues.reduce((s,i)=>s+parseInt(i.severity||3),0)/total).toFixed(1) : '–';

  const catCounts = CATS.map(c=>({cat:c,count:issues.filter(i=>i.category===c).length})).filter(x=>x.count>0).sort((a,b)=>b.count-a.count);
  const maxCC = catCounts[0]?.count||1;
  const recent = [...issues].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,4);
  const T = t();

  const statColors = ['#162920','#1D4ED8','#059669','#D97706'];
  const statVals = [total,cats,comms,avgSev];

  return `
  <div class="page-header">
    <h1 class="page-title">${T.brand}</h1>
    <p class="page-sub">${CONFIG.LOCATION}</p>
  </div>
  ${!isConfigured ? `<div class="notice">⚠️ ${T.setupNotice}</div>` : ''}
  <div class="stats-grid">
    ${T.stats.map((lbl,i)=>`
    <div class="stat-card">
      <div class="stat-label">${lbl}</div>
      <div class="stat-val" style="color:${statColors[i]}">${statVals[i]}</div>
    </div>`).join('')}
  </div>
  <div class="two-col">
    <div class="card">
      <div class="sec-title">${T.catBreak}</div>
      ${catCounts.map(({cat:c,count})=>`
      <div class="bar-row">
        <div class="bar-label"><span>${CAT_META[c]?.icon||''} ${catLabel(c)}</span><span>${count}</span></div>
        <div class="bar-track"><div class="bar-fill" style="width:${(count/maxCC)*100}%;background:${CAT_META[c]?.color||'#6B7280'}"></div></div>
      </div>`).join('')}
    </div>
    <div class="card">
      <div class="row-between">
        <div class="sec-title" style="margin:0">${T.recent}</div>
        <button onclick="showView('issues')" style="font-size:12px;color:#D97706;background:none;border:none;cursor:pointer">${T.viewAll}</button>
      </div>
      ${recent.map(issue=>{
        const c=cat(issue.category);
        return `<div style="display:flex;gap:12px;align-items:flex-start;padding:10px 0;border-bottom:0.5px solid #F3F4F6">
          <div style="width:32px;height:32px;border-radius:8px;background:${c.bg};display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0">${c.icon}</div>
          <div style="flex:1;min-width:0">
            <div style="font-size:13px;font-weight:500;color:#1F2937;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${getTitle(issue)}</div>
            <div style="font-size:11px;color:#9CA3AF;margin-top:2px">${issue.date} · ${issue.location}</div>
          </div>
          <span class="badge" style="background:${SEV_META[parseInt(issue.severity||3)]?.bg};color:${SEV_META[parseInt(issue.severity||3)]?.color};flex-shrink:0;font-size:10px">${sevLabel(issue.severity)}</span>
        </div>`;
      }).join('')}
    </div>
  </div>
  <div class="card">
    <div class="sec-title">${T.sevDist}</div>
    <div class="sev-grid">
      ${[1,2,3,4,5].map(s=>{
        const count=issues.filter(i=>parseInt(i.severity||3)===s).length;
        const sv=SEV_META[s];
        return `<div class="sev-cell">
          <div class="sev-box" style="background:${sv.bg}">
            <div class="sev-count" style="color:${sv.color}">${count}</div>
          </div>
          <div class="sev-lbl">${sv.label[lang]||sv.label.en}</div>
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

function renderIssues() {
  applyFilters();
  const T = t();
  return `
  <div class="page-header">
    <h1 class="page-title">${T.nav[1]}</h1>
    <p class="page-sub">${filteredIssues.length} of ${issues.length} issues</p>
  </div>
  <div class="filter-row">
    <input id="search-input" placeholder="${T.filters.search}" value="${filterSearch}" oninput="onSearch(this.value)"/>
    <select onchange="onCatFilter(this.value)">
      <option value="All" ${filterCat==='All'?'selected':''}>${T.filters.cat}: ${T.filters.all}</option>
      ${CATS.map(c=>`<option value="${c}" ${filterCat===c?'selected':''}>${catLabel(c)}</option>`).join('')}
    </select>
    <select onchange="onSevFilter(this.value)">
      <option value="All" ${filterSev==='All'?'selected':''}>${T.filters.sev}: ${T.filters.all}</option>
      ${[1,2,3,4,5].map(s=>`<option value="${s}" ${filterSev===String(s)?'selected':''}>${s} – ${SEV_META[s].label[lang]||SEV_META[s].label.en}</option>`).join('')}
    </select>
  </div>
  ${filteredIssues.length===0
    ? `<div class="empty">${T.noIssues}</div>`
    : `<div class="issues-grid">${filteredIssues.map(issueCardHTML).join('')}</div>`}`;
}

function renderSubmit() {
  const T = t();
  return `
  <div class="page-header">
    <h1 class="page-title">${T.submitTitle}</h1>
    <p class="page-sub">${T.submitDesc}</p>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px">
    <div class="card">
      <div class="sec-title">${T.submitSteps}</div>
      <div style="margin-top:8px">
        ${[T.sub1,T.sub2,T.sub3,T.sub4].map((step,i)=>`
        <div class="step">
          <div class="step-num">${i+1}</div>
          <div class="step-body"><div class="step-desc">${step}</div></div>
        </div>`).join('')}
      </div>
      <div style="margin-top:16px">
        ${CONFIG.GOOGLE_FORM_URL
          ? `<a href="${CONFIG.GOOGLE_FORM_URL}" target="_blank" class="btn-primary">${T.formBtn}</a>`
          : `<div style="font-size:13px;color:#9CA3AF;padding:12px;background:#F9FAFB;border-radius:8px">${T.noForm}</div>`}
      </div>
    </div>
    <div class="card">
      <div class="sec-title">${T.howItWorks}</div>
      <div style="margin-top:8px">
        ${[T.step1,T.step2,T.step3].map((step,i)=>`
        <div class="step">
          <div class="step-num">${i+1}</div>
          <div class="step-body"><div class="step-desc">${step}</div></div>
        </div>`).join('')}
      </div>
    </div>
  </div>`;
}

// ──────────────────────────── ROUTING ────────────────────────────
function showView(v) {
  view = v;
  ['dashboard','issues','submit'].forEach((name,i) => {
    document.getElementById('nb-'+name).className = 'nav-btn' + (name===v?' active':'');
  });
  render();
}

function render() {
  const T = t();
  // Update sidebar text
  document.getElementById('sb-brand').textContent = T.brand;
  document.getElementById('sb-tag').textContent = T.tag;
  ['dashboard','issues','submit'].forEach((name,i) => {
    document.getElementById('nl-'+name).textContent = T.nav[i];
  });
  document.getElementById('lang-label').textContent = T.lang;
  document.getElementById('sb-foot').textContent = lastUpdated ? `${T.lastUpdated}: ${lastUpdated.toLocaleDateString()}` : CONFIG.LOCATION;

  const main = document.getElementById('main-area');
  if (view==='dashboard') main.innerHTML = renderDashboard();
  else if (view==='issues') main.innerHTML = renderIssues();
  else main.innerHTML = renderSubmit();
}

function setLang(l) {
  lang = l;
  document.querySelectorAll('.lang-btn').forEach((btn,i) => {
    btn.className = 'lang-btn' + (['en','bm','zh'][i]===l?' active':'');
  });
  render();
}

function onSearch(v) { filterSearch = v; applyFilters(); document.getElementById('main-area').querySelector('.issues-grid, .empty').outerHTML = filteredIssues.length===0?`<div class="empty">${t().noIssues}</div>`:`<div class="issues-grid">${filteredIssues.map(issueCardHTML).join('')}</div>`; document.querySelector('.page-sub').textContent=`${filteredIssues.length} of ${issues.length} issues`; }
function onCatFilter(v) { filterCat = v; render(); }
function onSevFilter(v) { filterSev = v; render(); }

// ──────────────────────────── INIT ────────────────────────────
(async () => {
  await fetchIssues();
  render();
})();
</script>
</body>
</html>
